<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Histogram Quiz: Symmetric, Left- or Right-Skewed?</title>
  <style>
    :root{
      --bg:#0f172a;          /* Slate-900 */
      --panel:#111827;       /* Gray-900 */
      --muted:#94a3b8;       /* Slate-400 */
      --text:#e5e7eb;        /* Gray-200 */
      --accent:#22c55e;      /* Green-500 */
      --accent-2:#38bdf8;    /* Sky-400 */
      --warn:#f59e0b;        /* Amber-500 */
      --err:#ef4444;         /* Red-500 */
      --card:#0b1220;
    }
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans";
      background: radial-gradient(1200px 600px at 80% -10%, #1e293b 0%, #0b1020 45%, var(--bg) 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .wrap{
      width: min(980px, 100%);
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 60%) , var(--card);
      border: 1px solid rgba(148,163,184,0.15);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      overflow:hidden;
    }
    header{
      padding: 18px 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid rgba(148,163,184,0.12);
      background: linear-gradient(180deg, rgba(56,189,248,0.08), rgba(56,189,248,0.02));
    }
    h1{
      font-size: clamp(18px, 2.5vw, 22px);
      margin:0;
      letter-spacing:.2px;
      font-weight:700;
    }
    #status{
      font-size:14px;
      color:var(--muted)
    }
    .content{
      padding: 18px 22px 8px;
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
    }
    .canvas-wrap{
      background: linear-gradient(180deg, rgba(34,197,94,0.06), rgba(34,197,94,0.02));
      border:1px solid rgba(34,197,94,0.18);
      border-radius:14px;
      padding:10px;
    }
    canvas{
      width:100%;
      height:420px;
      display:block;
      border-radius:10px;
      background: #0a0f1a;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding: 6px 0 18px;
    }
    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    button{
      appearance:none;
      border:none;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight:700;
      cursor:pointer;
      color:#0b1020;
      background:#e5e7eb;
      transition: transform .04s ease, opacity .2s ease, box-shadow .2s ease, background .2s ease;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
    }
    button:hover{ transform: translateY(-1px); }
    button:active{ transform: translateY(0); }
    .opt{ background: #cbd5e1; }
    .opt[data-kind="symmetric"]{ background:#c7f9e9; }
    .opt[data-kind="left"]{ background:#fde68a; }
    .opt[data-kind="right"]{ background:#fca5a5; }
    .opt[disabled]{ opacity:.55; cursor:not-allowed; }
    .primary{
      background: linear-gradient(180deg, var(--accent-2), #0891b2);
      color:white;
    }
    .ghost{
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(148,163,184,0.25);
    }
    .pill{
      padding: 6px 10px;
      border-radius:999px;
      font-size:12px;
      border:1px solid rgba(148,163,184,.2);
      color:var(--muted);
    }
    .legend{
      display:flex; gap:14px; align-items:center; flex-wrap:wrap;
      font-size:13px; color: var(--muted)
    }
    .dot{ width:10px; height:10px; border-radius:999px; display:inline-block; margin-right:6px; }
    .dot.hist{ background:#64748b; }
    .dot.curve{ background:#38bdf8; }
    .result{
      padding: 16px 18px;
      border-top:1px dashed rgba(148,163,184,.18);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      color:var(--muted);
      font-size: 14px;
    }
    .score{
      font-weight:800; color:#fff;
    }
    .answer-msg{
      font-weight:700;
    }
    .correct{ color: var(--accent); }
    .wrong{ color: var(--err); }
    .end-screen{
      text-align:center; padding: 16px 6px 22px; color: var(--muted);
    }
    .end-screen h2{
      margin:.2rem 0 0.6rem; color:#fff
    }
    .sr-only{
      position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <header>
        <h1>Histogram Quiz</h1>
        <div id="status">Question <span id="qnum">1</span> of <span id="qtotal">10</span></div>
      </header>

      <div class="content">
        <div class="canvas-wrap">
          <canvas id="plot" width="1000" height="480" aria-label="Histogram with overlaid normal distribution"></canvas>
        </div>

        <div class="legend">
          <span class="pill">Task: Decide whether the distribution is <b>symmetric</b>, <b>left-skewed</b>, or <b>right-skewed</b>.</span>
          <span><span class="dot hist"></span>Histogram</span>
          <span><span class="dot curve"></span>Normal distribution (same μ &amp; σ)</span>
        </div>

        <div class="controls">
          <div class="btn-row" role="group" aria-label="Answers">
            <button class="opt" data-guess="symmetric" data-kind="symmetric">Symmetric</button>
            <button class="opt" data-guess="left" data-kind="left">Left-skewed</button>
            <button class="opt" data-guess="right" data-kind="right">Right-skewed</button>
          </div>
          <div class="btn-row">
            <button id="next" class="primary" disabled>Next</button>
            <button id="restart" class="ghost">Restart</button>
          </div>
        </div>

        <div class="result">
          <div id="feedback" class="answer-msg">&nbsp;</div>
          <div>Correct: <span class="score" id="score">0</span></div>
        </div>

        <div class="end-screen" id="end" hidden>
          <h2>Finished!</h2>
          <p>You got <b id="finalScore">0</b> out of <b id="totalQ">10</b> correct.</p>
          <button id="again" class="primary">Play again</button>
        </div>
      </div>
    </div>
  </div>

<script>
(function(){
  // --- Utilities ------------------------------------------------------------
  const randn = (()=>{ // Box–Muller
    let spare, hasSpare=false;
    return function(){
      if(hasSpare){ hasSpare=false; return spare; }
      let u=0, v=0;
      while(u===0) u=Math.random();
      while(v===0) v=Math.random();
      const mag = Math.sqrt(-2.0*Math.log(u));
      const z0 = mag * Math.cos(2*Math.PI*v);
      const z1 = mag * Math.sin(2*Math.PI*v);
      spare = z1; hasSpare = true;
      return z0;
    }
  })();

  function mean(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length; }
  function std(arr){
    const m = mean(arr);
    const v = arr.reduce((acc,x)=> acc + (x-m)*(x-m), 0) / (arr.length-1);
    return Math.sqrt(v);
  }
  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  // Generate sample data with desired "shape"
  function sampleData(kind){
    const n = 700; // enough points for a smooth histogram
    let raw=[];
    if(kind === 'symmetric'){
      const mu = (Math.random()*4 - 2);
      const sig = (Math.random()*1.2 + 0.7);
      for(let i=0;i<n;i++) raw.push(mu + sig*randn());
    }else if(kind === 'right'){
      for(let i=0;i<n;i++){
        const z = randn();
        raw.push(Math.exp(0.9*z));
      }
      const m = mean(raw), s = std(raw) || 1;
      const scale = Math.random()*1.2 + 0.7;
      const shift = Math.random()*4 - 2;
      raw = raw.map(x => (x - m)/s * scale + shift);
    }else{ // 'left'
      let temp=[];
      for(let i=0;i<n;i++){
        const z = randn();
        temp.push(Math.exp(0.9*z));
      }
      const m = mean(temp), s = std(temp) || 1;
      temp = temp.map(x => (x - m)/s);
      raw = temp.map(x => -x);
      const scale = Math.random()*1.2 + 0.7;
      const shift = Math.random()*4 - 2;
      raw = raw.map(x => x*scale + shift);
    }

    const m = mean(raw), s = std(raw) || 1;
    const lo = m - 4.5*s, hi = m + 6*s;
    const data = raw.filter(x => x>=lo && x<=hi);

    return data;
  }

  function histogram(data, bins=14){
    const lo = Math.min(...data), hi = Math.max(...data);
    const pad = (hi-lo)*0.06 || 1;
    const min = lo - pad, max = hi + pad;
    const width = (max - min) / bins;
    const counts = new Array(bins).fill(0);
    data.forEach(x=>{
      let idx = Math.floor((x - min) / width);
      if(idx < 0) idx = 0;
      if(idx >= bins) idx = bins-1;
      counts[idx]++;
    });
    const edges = Array.from({length: bins+1}, (_,i)=> min + i*width);
    const centers = edges.slice(0, -1).map((e,i)=> e + width/2);
    return {counts, edges, centers, width, min, max};
  }

  function normalPdf(x, mu, sigma){
    const a = 1/(sigma*Math.sqrt(2*Math.PI));
    const z = (x-mu)/sigma;
    return a * Math.exp(-0.5*z*z);
  }

  const canvas = document.getElementById('plot');
  const ctx = canvas.getContext('2d');

  function clearCanvas(){
    ctx.clearRect(0,0,canvas.width, canvas.height);
  }

  function drawAxes(area){
    const {x0,y0,x1,y1} = area;
    ctx.save();
    ctx.strokeStyle = 'rgba(148,163,184,0.35)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x0, y1); ctx.lineTo(x1, y1);
    ctx.moveTo(x0, y1); ctx.lineTo(x0, y0);
    ctx.stroke();
    ctx.restore();
  }

  function drawGridY(area, yScale, maxY){
    const {x0,x1} = area;
    ctx.save();
    ctx.strokeStyle = 'rgba(148,163,184,0.15)';
    ctx.fillStyle   = 'rgba(148,163,184,0.65)';
    ctx.lineWidth = 1;
    ctx.font = '12px ui-sans-serif, system-ui';
    const steps = 5;
    for(let i=1;i<=steps;i++){
      const val = Math.round(maxY*i/steps);
      const y = yScale(val);
      ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
      ctx.fillText(val.toString(), x0-28, y+4);
    }
    ctx.restore();
  }

  function drawHistogram(bins, area, yScale){
    const {counts, edges} = bins;
    ctx.save();
    ctx.fillStyle = '#64748b';
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 1;
    const yBase = area.y1;
    for(let i=0;i<counts.length;i++){
      const xL = xScale(edges[i], area, bins.min, bins.max);
      const xR = xScale(edges[i+1], area, bins.min, bins.max) - 1;
      const yTop = yScale(counts[i]);
      const w = Math.max(1, xR - xL);
      const h = Math.max(1, yBase - yTop);
      const r = Math.min(6, h, w/2);
      ctx.beginPath();
      ctx.moveTo(xL, yBase);
      ctx.lineTo(xL, yTop+r);
      ctx.quadraticCurveTo(xL, yTop, xL+r, yTop);
      ctx.lineTo(xR-r, yTop);
      ctx.quadraticCurveTo(xR, yTop, xR, yTop+r);
      ctx.lineTo(xR, yBase);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawNormalCurve(mu, sigma, nPoints, scaleTo, area, xMin, xMax){
    ctx.save();
    ctx.strokeStyle = '#38bdf8';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    for(let i=0;i<nPoints;i++){
      const t = i/(nPoints-1);
      const xVal = xMin + t*(xMax - xMin);
      const yCount = normalPdf(xVal, mu, sigma) * scaleTo;
      const x = xScale(xVal, area, xMin, xMax);
      const y = yScale(yCount, area, maxYGlobal);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.restore();
  }

  function xScale(x, area, min, max){
    const {x0,x1} = area;
    return x0 + (x - min) * (x1 - x0) / (max - min);
  }
  function yScale(y, area, maxY){
    const {y0,y1} = area;
    const t = clamp(y / maxY, 0, 1);
    return y1 - t*(y1 - y0);
  }

  // --- Game state -----------------------------------------------------------
  const TOTAL = 10;
  document.getElementById('qtotal').textContent = TOTAL.toString();
  document.getElementById('totalQ').textContent = TOTAL.toString();

  let current = 0;
  let score = 0;
  let answer = null;
  let data = [];
  let bins = null;
  let maxYGlobal = 1;

  const feedbackEl = document.getElementById('feedback');
  const scoreEl = document.getElementById('score');
  const qnumEl = document.getElementById('qnum');
  const nextBtn = document.getElementById('next');
  const restartBtn = document.getElementById('restart');
  const againBtn = document.getElementById('again');
  const endPanel = document.getElementById('end');
  const finalScoreEl = document.getElementById('finalScore');

  const optBtns = Array.from(document.querySelectorAll('.opt'));
  optBtns.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(endPanel.hidden === false) return;
      const guess = btn.dataset.guess;
      checkAnswer(guess);
      optBtns.forEach(b=> b.disabled = true);
      nextBtn.disabled = false;
    });
  });

  nextBtn.addEventListener('click', ()=>{
    if(current >= TOTAL){ return; }
    current++;
    if(current === TOTAL){
      showEnd();
    }else{
      qnumEl.textContent = (current+1).toString();
      nextBtn.disabled = true;
      optBtns.forEach(b=> b.disabled = false);
      feedbackEl.innerHTML = '&nbsp;';
      newRound();
    }
  });

  restartBtn.addEventListener('click', resetGame);
  againBtn?.addEventListener('click', resetGame);

  function resetGame(){
    current = 0;
    score = 0;
    scoreEl.textContent = '0';
    qnumEl.textContent = '1';
    endPanel.hidden = true;
    nextBtn.disabled = true;
    optBtns.forEach(b=> b.disabled = false);
    feedbackEl.innerHTML = '&nbsp;';
    newRound();
  }

  function showEnd(){
    endPanel.hidden = false;
    finalScoreEl.textContent = score.toString();
  }

  function checkAnswer(guess){
    const correct = answer;
    if(guess === correct){
      score++;
      scoreEl.textContent = score.toString();
      feedbackEl.innerHTML = `<span class="correct">✔ Correct!</span> It was <b>${labelFor(correct)}</b>.`;
    }else{
      feedbackEl.innerHTML = `<span class="wrong">✘ Incorrect.</span> The correct answer is <b>${labelFor(correct)}</b>.`;
    }
  }

  function labelFor(kind){
    return kind==='symmetric' ? 'symmetric' : (kind==='left' ? 'left-skewed' : 'right-skewed');
  }

  function chooseKind(){
    const r = Math.random();
    if(r < 1/3) return 'symmetric';
    if(r < 2/3) return 'left';
    return 'right';
  }

  function newRound(){
    answer = chooseKind();
    data = sampleData(answer);
    draw();
  }

  function draw(){
    clearCanvas();
    const margin = {left:56, right:16, top:18, bottom:46};
    const area = {
      x0: margin.left,
      y0: margin.top,
      x1: canvas.width - margin.right,
      y1: canvas.height - margin.bottom
    };

    bins = histogram(data, 14);
    const mu = mean(data);
    const sigma = std(data) || 1;

    const n = data.length;
    const scaleTo = n * bins.width;
    const maxHist = Math.max(...bins.counts);
    const curvePeak = normalPdf(mu, mu, sigma) * scaleTo;
    const maxY = Math.max(maxHist, curvePeak) * 1.15;
    maxYGlobal = maxY;

    drawAxes(area);
    drawGridY(area, y => yScale(y, area, maxY), maxY);
    drawHistogram(bins, area, yVal => yScale(yVal, area, maxY));

    const xMin = bins.min, xMax = bins.max;
    drawNormalCurve(mu, sigma, 400, scaleTo, area, xMin, xMax);

    ctx.save();
    ctx.fillStyle = 'rgba(148,163,184,0.85)';
    ctx.font = '12px ui-sans-serif, system-ui';
    ctx.textAlign='center';
    const ticks = 8;
    for(let i=0;i<=ticks;i++){
      const t = i/ticks;
      const xv = xMin + t*(xMax - xMin);
      const x = xScale(xv, area, xMin, xMax);
      const y = area.y1;
      ctx.fillText(xv.toFixed(2), x, y+18);
      ctx.strokeStyle = 'rgba(148,163,184,0.12)';
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, area.y0); ctx.stroke();
    }
    ctx.restore();

    ctx.save();
    ctx.fillStyle = 'rgba(148,163,184,0.8)';
    ctx.font = '12px ui-sans-serif, system-ui';
    ctx.fillText(`μ = ${mu.toFixed(2)},  σ = ${sigma.toFixed(2)}`, area.x1-140, area.y0+14);
    ctx.restore();
  }

  function resizeForDPR(){
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const w = Math.round(rect.width * dpr);
    const h = Math.round(rect.height * dpr);
    if(canvas.width !== w || canvas.height !== h){
      canvas.width = w; canvas.height = h;
      draw();
    }
  }
  new ResizeObserver(resizeForDPR).observe(canvas);
  resetGame();
})();
</script>
</body>
</html>
